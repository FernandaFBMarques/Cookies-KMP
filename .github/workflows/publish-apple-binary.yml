name: Publish Apple Binary

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. 0.1.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-apple-binary:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Apple XCFramework zip
        run: ./scripts/build_apple_xcframework.sh

      - name: Compute checksum
        id: checksum
        run: |
          set -euo pipefail
          CHECKSUM="$(./scripts/compute_spm_checksum.sh | tail -n 1)"
          echo "value=${CHECKSUM}" >> "$GITHUB_OUTPUT"
          echo "${CHECKSUM}" > build/apple-release/CookiesKMP.sha256

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          files: |
            build/apple-release/CookiesKMP.xcframework.zip
            build/apple-release/CookiesKMP.sha256
          overwrite_files: true

